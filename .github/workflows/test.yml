name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Structure invariants
        run: bash tests/test-structure.sh
      - name: Record scripts
        run: bash tests/test-scripts.sh
      - name: Hooks
        run: bash tests/test-hooks.sh
